<!DOCTYPE html>
<html>
  <body>
    <p>Authenticating!!</p>
    <script>
      let tokenHash = window.location.hash;
      console.log('tokenHash:', tokenHash);
      if (tokenHash) {
        if (tokenHash.includes('access_token')) {
          console.log('has access_token');
          if (window.opener) {
            console.log('opener exists, sending message');
            window.opener.postMessage({ type: 'supabase_auth', hash: tokenHash }, '*');
            window.close();
          } else if (window.parent !== window) {
            console.log('sending to parent');
            window.parent.postMessage({ type: 'supabase_auth', hash: tokenHash }, '*');
          } else {
            console.log('no opener or parent');
          }
        }
      } else {
        console.log('no tokenHash found');
      }
    </script>
  </body>
</html>
