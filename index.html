<!DOCTYPE html>
<html>
  <body>
    <p>Authenticating</p>
    <script>
      let tokenHash = window.location.hash;
      if (tokenHash){
        if (tokenHash.includes('access_token')){
          if (window.opener){
            window.opener.postMessage({
              type: 'supabase_auth',
              hash: tokenHash
            }, '*');
            window.close();
          }
          else if (window.parent !== window){
            window.parent.postMessage({
              type: 'supabase_auth',
              hash: tokenHash
            }, '*');
          }
          else {
            let params = new URLSearchParams(tokenHash.substring(1));
            let redirectUrl = localStorage.getItem('gameUrl');
          }
        }
        else {
          let gameUrl = new URLSearchParams(window.location.search).get('gameUrl');
          if (gameUrl){
            localStorage.setItem('gameUrl',gameUrl);
          }
        }
      }
    </script>
  </body>
</html>
</html>
